<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Simulation de câbles crossfade entre pads</title>
  <desc id="desc">Trois variantes graphiques pour représenter des relations crossfade entre pads dans Soundboard Live.</desc>
  <rect width="1200" height="720" fill="#101114"/>
  <text x="54" y="58" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Représentation graphique des crossfades</text>
  <text x="54" y="91" fill="#9da3ad" font-family="Inter, Arial, sans-serif" font-size="15">Simulation : câbles type jack, départ/arrêt, ducking et sens du déclenchement.</text>

  <g transform="translate(54 132)">
    <text x="0" y="-18" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">1. Câbles directs sur le board</text>
    <rect x="0" y="0" width="320" height="150" rx="14" fill="#1b2028" stroke="#3b4250"/>
    <rect x="390" y="0" width="320" height="150" rx="14" fill="#1b2028" stroke="#3b4250"/>
    <rect x="780" y="0" width="320" height="150" rx="14" fill="#1b2028" stroke="#3b4250"/>
    <text x="24" y="45" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Intro</text>
    <text x="414" y="45" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Ambiance</text>
    <text x="804" y="45" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Voix</text>
    <circle cx="300" cy="75" r="10" fill="#49d3a0"/>
    <circle cx="390" cy="75" r="10" fill="#49d3a0"/>
    <path d="M300 75 C335 30 355 30 390 75" fill="none" stroke="#49d3a0" stroke-width="9" stroke-linecap="round"/>
    <path d="M690 75 C725 120 745 120 780 75" fill="none" stroke="#ff5f56" stroke-width="9" stroke-linecap="round"/>
    <circle cx="690" cy="75" r="10" fill="#ff5f56"/>
    <circle cx="780" cy="75" r="10" fill="#ff5f56"/>
    <text x="328" y="24" fill="#49d3a0" font-family="Inter, Arial, sans-serif" font-size="13">lance</text>
    <text x="716" y="139" fill="#ff5f56" font-family="Inter, Arial, sans-serif" font-size="13">stoppe</text>
  </g>

  <g transform="translate(54 350)">
    <text x="0" y="-18" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">2. Mode “patch bay” séparé</text>
    <rect x="0" y="0" width="500" height="226" rx="14" fill="#171b22" stroke="#3b4250"/>
    <text x="24" y="39" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Sorties</text>
    <text x="360" y="39" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Entrées</text>
    <g fill="#262c36" stroke="#626b7a">
      <rect x="24" y="64" width="150" height="38" rx="8"/>
      <rect x="24" y="116" width="150" height="38" rx="8"/>
      <rect x="24" y="168" width="150" height="38" rx="8"/>
      <rect x="326" y="64" width="150" height="38" rx="8"/>
      <rect x="326" y="116" width="150" height="38" rx="8"/>
      <rect x="326" y="168" width="150" height="38" rx="8"/>
    </g>
    <g fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="14">
      <text x="42" y="88">Intro</text>
      <text x="42" y="140">Ambiance</text>
      <text x="42" y="192">Voix</text>
      <text x="344" y="88">Intro</text>
      <text x="344" y="140">Ambiance</text>
      <text x="344" y="192">Voix</text>
    </g>
    <path d="M174 83 C245 40 258 167 326 187" fill="none" stroke="#f6c451" stroke-width="8" stroke-linecap="round"/>
    <path d="M174 135 C235 180 270 77 326 83" fill="none" stroke="#49d3a0" stroke-width="8" stroke-linecap="round"/>
    <path d="M174 187 C240 110 258 131 326 135" fill="none" stroke="#8db5ff" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 12"/>
    <text x="204" y="216" fill="#9da3ad" font-family="Inter, Arial, sans-serif" font-size="13">Vue dédiée : plus lisible quand il y a beaucoup de liens.</text>
  </g>

  <g transform="translate(640 350)">
    <text x="0" y="-18" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">3. Overlay temporaire</text>
    <rect x="0" y="0" width="500" height="226" rx="14" fill="#171b22" stroke="#3b4250"/>
    <rect x="30" y="42" width="190" height="74" rx="12" fill="#273425" stroke="#49d3a0"/>
    <rect x="280" y="42" width="190" height="74" rx="12" fill="#332424" stroke="#ff5f56"/>
    <rect x="154" y="142" width="190" height="58" rx="12" fill="#222937" stroke="#8db5ff"/>
    <text x="52" y="86" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Intro</text>
    <text x="302" y="86" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Voix</text>
    <text x="176" y="178" fill="#f3f4f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Ambiance</text>
    <path d="M220 78 C256 30 254 30 280 78" fill="none" stroke="#ff5f56" stroke-width="8" stroke-linecap="round"/>
    <path d="M125 116 C160 157 160 157 154 171" fill="none" stroke="#49d3a0" stroke-width="8" stroke-linecap="round"/>
    <path d="M375 116 C350 149 350 149 344 171" fill="none" stroke="#8db5ff" stroke-width="8" stroke-linecap="round" stroke-dasharray="13 10"/>
    <text x="30" y="216" fill="#9da3ad" font-family="Inter, Arial, sans-serif" font-size="13">Bouton “câbles” : affichage temporaire, aucune surcharge en live.</text>
  </g>
</svg>
