<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spike wavesurfer — Trim Audio + options</title>
<style>
  :root { color-scheme: dark; --blue:#3a9bff; --red:#ff5b5b; --orange:#ffa83a; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #000; color: #e9ecf2; font: 14px/1.4 system-ui, -apple-system, sans-serif; }
  .dlg { max-width: 980px; margin: 0 auto; }
  .titlebar { padding: 16px 22px; font-weight: 700; font-size: 1.05rem; }
  .body { padding: 0 22px 14px; }
  .head { display: grid; grid-template-columns: 1fr auto 1fr; align-items: baseline; row-gap: 6px; margin: 8px 0 4px; }
  .clip-title { grid-column: 1; font-weight: 700; }
  .total { grid-column: 3; text-align: right; color: #9aa1ad; font-variant-numeric: tabular-nums; }
  .in  { grid-column: 1; color: var(--blue);  font-variant-numeric: tabular-nums; }
  .sel { grid-column: 2; text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
  .out { grid-column: 3; text-align: right; color: var(--red); font-variant-numeric: tabular-nums; }
  .zoomrow { display: flex; justify-content: space-between; color: #6e7682; font-size: .82rem; margin: 2px 0 12px; }
  .toolbar { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .toolbar .grp { display: flex; gap: 8px; }
  .tbtn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 8px;
          border: 1px solid #2c313c; background: #14171e; color: #c7ccd6; font-size: .82rem; cursor: pointer; }
  .tbtn:hover { border-color: #444b59; }
  .tbtn.cut { color: var(--red); } .tbtn.silence { color: var(--orange); }
  .tbtn svg { width: 15px; height: 15px; }
  #wave { border: 2px solid var(--wsBorder, #3a9bff); border-radius: 6px; background: var(--wsBg, #04060a); padding: 2px 0; }
  #wave ::part(region-handle-left), #wave ::part(region-handle-right) { width: 9px; border: none; background: var(--rg, #888); opacity: .95; }
  .rg-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); padding: 4px 10px; border-radius: 5px;
    font-size: .72rem; font-weight: 800; letter-spacing: .08em; color: #fff; background: rgba(0,0,0,.35); pointer-events: none; white-space: nowrap; }
  .rg-dots { position: absolute; top: 5px; right: 6px; display: flex; gap: 5px; }
  .rg-dots i { width: 13px; height: 13px; border-radius: 50%; display: grid; place-items: center; font-size: 9px; font-weight: 900; color: #07120b; cursor: pointer; }
  .rg-dots .ok { background: #46d39a; } .rg-dots .no { background: var(--rg, #ff5b5b); color: #1a0707; }
  .transport { display: flex; justify-content: center; align-items: center; gap: 14px; margin: 18px 0 6px; }
  .tp { width: 52px; height: 44px; border-radius: 12px; border: 1px solid #2c313c; background: #14171e; color: #d6dae2; display: grid; place-items: center; cursor: pointer; }
  .tp.play { width: 70px; height: 70px; border-radius: 50%; background: #1b1f29; } .tp.play.is-playing { background: #2a3550; }
  .tp svg { width: 22px; height: 22px; } .tp.play svg { width: 28px; height: 28px; }
  .footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; border-top: 1px solid #1b1f27; }
  .fbtn { padding: 9px 16px; border-radius: 8px; border: 1px solid #2c313c; background: #14171e; color: #d6dae2; cursor: pointer; }
  .status { padding: 6px 22px 4px; font-size: .78rem; color: #6e7682; } .status b { color: #7ee0a2; }

  /* Panneau d'options */
  .opts { margin: 18px 22px 8px; border: 1px solid #232833; border-radius: 10px; background: #0c0f15; }
  .opts > summary { cursor: pointer; padding: 12px 16px; font-weight: 700; list-style: none; }
  .opts > summary::before { content: "▸ "; color: #6e7682; }
  .opts[open] > summary::before { content: "▾ "; }
  .opts .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 10px 18px; padding: 4px 16px 16px; }
  .opt { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; font-size: .82rem; color: #c4c8d2; }
  .opt input[type=range] { grid-column: 1 / -1; width: 100%; }
  .opt .lbl { display: flex; justify-content: space-between; grid-column: 1 / -1; }
  .opt output { color: var(--blue); font-variant-numeric: tabular-nums; }
  .opt input[type=color] { width: 42px; height: 24px; padding: 0; border: 1px solid #2c313c; background: none; }
  .opt select, .opt input[type=number] { background: #14171e; color: #e9ecf2; border: 1px solid #2c313c; border-radius: 6px; padding: 4px 6px; }
  .opts .actions { padding: 0 16px 16px; display: flex; gap: 10px; align-items: center; }
  .opts pre { margin: 0 16px 16px; padding: 12px; background: #07090d; border: 1px solid #1b1f27; border-radius: 8px; font-size: .76rem; color: #9aa1ad; white-space: pre-wrap; max-height: 220px; overflow: auto; }
</style>
</head>
<body>
<div class="dlg">
  <div class="titlebar">Trim Audio</div>
  <div class="body">
    <div class="head">
      <div class="clip-title">L'oiseau bleu (final)</div>
      <div class="total">Total: <span id="tTotal">0:00.000</span></div>
      <div class="in">In: <span id="tIn">0:00.000</span></div>
      <div class="sel">Selected: <span id="tSel">0:00.000</span></div>
      <div class="out">Out: <span id="tOut">0:00.000</span></div>
    </div>
    <div class="zoomrow"><span>🔍 <span id="zoomPct">100%</span></span><span>Scroll to zoom</span></div>
    <div class="toolbar">
      <div class="grp">
        <button class="tbtn cut" id="addCut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.5 15.5M20 20 8.5 8.5"/></svg>Cut Region</button>
        <button class="tbtn silence" id="addSilence"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 10v4h4l5 4V6l-5 4H4Z"/><path d="m17 9 4 6M21 9l-4 6"/></svg>Silence Region</button>
      </div>
      <div class="grp"><button class="tbtn" id="undo">↺ Undo</button><button class="tbtn" id="reset">↻ Reset</button></div>
    </div>
    <div id="wave"></div>
    <div class="transport">
      <button class="tp" id="toStart"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h2v14H7zM20 5 9 12l11 7z"/></svg></button>
      <button class="tp play" id="play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="tp" id="zoomOut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4M8 11h6"/></svg></button>
      <button class="tp" id="zoomIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4M11 8v6M8 11h6"/></svg></button>
    </div>
  </div>

  <details class="opts" open>
    <summary>Options wavesurfer (règle, ça s'applique en direct)</summary>
    <div class="grid" id="optGrid"></div>
    <div class="actions">
      <button class="fbtn" id="exportOpts">Exporter mes réglages (JSON)</button>
      <span style="color:#6e7682;font-size:.78rem">→ copie-le et donne-le moi pour l'intégration</span>
    </div>
    <pre id="optJson" hidden></pre>
  </details>

  <div class="footer">
    <button class="fbtn">↺ Undo</button>
    <div style="display:flex;gap:10px"><button class="fbtn">Cancel</button><button class="fbtn apply">Apply</button></div>
  </div>
  <div class="status" id="status">Chargement…</div>
</div>

<script type="module">
  const $ = (id) => document.getElementById(id);
  let WaveSurfer, RegionsPlugin;
  try { WaveSurfer = (await import("./lib/wavesurfer.esm.js")).default; RegionsPlugin = (await import("./lib/regions.esm.js")).default; }
  catch (e) { $("status").innerHTML = "ÉCHEC import ESM local"; throw e; }

  const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toFixed(3).padStart(6,"0")}`;
  function makeToneWav() {
    const sr=22050,dur=15,n=sr*dur,s=new Float32Array(n);
    for (const [a,b,f] of [[1.2,2,300],[3,5.5,210],[6.5,7.2,360],[8.5,12.5,180],[13,14.5,420]]) { const i0=(a*sr)|0,i1=(b*sr)|0,len=i1-i0;
      for (let i=i0;i<i1;i++){ const t=(i-i0)/len; s[i]+=Math.sin(2*Math.PI*f*(i/sr))*0.8*Math.sin(Math.PI*t); } }
    const buf=new ArrayBuffer(44+n*2),dv=new DataView(buf),w=(o,x)=>{for(let i=0;i<x.length;i++)dv.setUint8(o+i,x.charCodeAt(i))};
    w(0,"RIFF");dv.setUint32(4,36+n*2,true);w(8,"WAVE");w(12,"fmt ");dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);
    dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);w(36,"data");dv.setUint32(40,n*2,true);
    let o=44;for(let i=0;i<n;i++){dv.setInt16(o,Math.max(-1,Math.min(1,s[i]))*0x7fff,true);o+=2;}
    return URL.createObjectURL(new Blob([buf],{type:"audio/wav"}));
  }

  // Options par défaut (le visuel actuel de la maquette)
  const opts = {
    waveColor: "#3a9bff", progressColor: "#2f7fd6", cursorColor: "#cfe2ff", cursorWidth: 2,
    barWidth: 0, barGap: 0, barRadius: 0, barAlign: "", barHeight: 1, height: 300,
    minPxPerSec: 1, fillParent: true, normalize: false, autoCenter: true, autoScroll: true,
    hideScrollbar: false, interact: true, dragToSeek: true,
    waveBorder: "#3a9bff", waveBg: "#04060a",
  };

  const regions = RegionsPlugin.create();
  const ws = WaveSurfer.create({ container:"#wave", url: makeToneWav(), plugins:[regions],
    waveColor:opts.waveColor, progressColor:opts.progressColor, cursorColor:opts.cursorColor, cursorWidth:opts.cursorWidth,
    barWidth:opts.barWidth||undefined, barGap:opts.barGap||undefined, barRadius:opts.barRadius||undefined, barAlign:opts.barAlign||undefined,
    barHeight:opts.barHeight, height:opts.height, minPxPerSec:opts.minPxPerSec, fillParent:opts.fillParent, normalize:opts.normalize,
    autoCenter:opts.autoCenter, autoScroll:opts.autoScroll, hideScrollbar:opts.hideScrollbar, interact:opts.interact, dragToSeek:opts.dragToSeek });

  ws.on("ready", () => { const d=ws.getDuration(); $("tTotal").textContent=fmt(d); $("tIn").textContent=fmt(0); $("tOut").textContent=fmt(d); $("tSel").textContent=fmt(d);
    $("status").innerHTML='wavesurfer <b>7.12.8</b> local/hors-ligne ✓ — règle les options ci-dessous.'; });

  // --- Régions
  const TINT={cut:"rgba(255,60,60,0.16)",silence:"rgba(255,150,40,0.14)"},EDGE={cut:"#ff5b5b",silence:"#ffa83a"};
  function decorate(r,type){ const el=r.element; if(!el) return; el.style.setProperty("--rg",EDGE[type]);
    const lab=document.createElement("div"); lab.className="rg-label"; lab.textContent=type.toUpperCase();
    const dots=document.createElement("div"); dots.className="rg-dots"; dots.innerHTML='<i class="ok">✓</i><i class="no">✕</i>';
    dots.querySelector(".no").onclick=(e)=>{e.stopPropagation();r.remove();}; el.appendChild(lab); el.appendChild(dots); }
  function add(type){ const d=ws.getDuration()||15, st=Math.random()*d*0.5+1, en=Math.min(d,st+d*0.12);
    decorate(regions.addRegion({start:st,end:en,color:TINT[type],drag:true,resize:true}),type); }
  $("addCut").onclick=()=>add("cut"); $("addSilence").onclick=()=>add("silence");
  $("reset").onclick=()=>regions.clearRegions(); $("undo").onclick=()=>{const a=regions.getRegions();a[a.length-1]?.remove();};
  $("play").onclick=()=>ws.playPause(); ws.on("play",()=>$("play").classList.add("is-playing")); ws.on("pause",()=>$("play").classList.remove("is-playing"));
  $("toStart").onclick=()=>ws.seekTo(0);
  let px=opts.minPxPerSec;
  const setZoom=(v)=>{px=Math.max(1,Math.min(600,v));ws.zoom(px);$("zoomPct").textContent=Math.round(px*100)+"%";};
  $("zoomIn").onclick=()=>setZoom(px*1.6); $("zoomOut").onclick=()=>setZoom(px/1.6);

  // --- Panneau d'options (génère les contrôles)
  const SPECS = [
    { k:"waveColor", t:"color", label:"waveColor (waveform)" },
    { k:"progressColor", t:"color", label:"progressColor (joué)" },
    { k:"cursorColor", t:"color", label:"cursorColor" },
    { k:"cursorWidth", t:"range", min:0, max:6, step:1, label:"cursorWidth" },
    { k:"barWidth", t:"range", min:0, max:12, step:1, label:"barWidth (0 = continu)" },
    { k:"barGap", t:"range", min:0, max:10, step:1, label:"barGap" },
    { k:"barRadius", t:"range", min:0, max:10, step:1, label:"barRadius" },
    { k:"barHeight", t:"range", min:0.2, max:3, step:0.1, label:"barHeight (échelle)" },
    { k:"barAlign", t:"select", options:["","top","bottom"], label:"barAlign" },
    { k:"height", t:"range", min:80, max:500, step:10, label:"height (px)" },
    { k:"waveBorder", t:"color", label:"couleur du cadre" },
    { k:"waveBg", t:"color", label:"fond de la zone" },
    { k:"normalize", t:"check", label:"normalize (affichage)" },
    { k:"fillParent", t:"check", label:"fillParent (adapter)" },
    { k:"autoCenter", t:"check", label:"autoCenter" },
    { k:"autoScroll", t:"check", label:"autoScroll" },
    { k:"hideScrollbar", t:"check", label:"hideScrollbar" },
    { k:"interact", t:"check", label:"interact (clic = seek)" },
    { k:"dragToSeek", t:"check", label:"dragToSeek" },
  ];
  function apply(k, v) {
    opts[k] = v;
    if (k === "waveBorder") { document.documentElement.style.setProperty("--wsBorder", v); return; }
    if (k === "waveBg") { document.documentElement.style.setProperty("--wsBg", v); return; }
    const o = { [k]: (k === "barWidth" || k === "barGap" || k === "barRadius") && v === 0 ? undefined : v };
    if (k === "barAlign" && v === "") o.barAlign = undefined;
    try { ws.setOptions(o); } catch (e) { console.warn("setOptions", k, e); }
  }
  const grid = $("optGrid");
  for (const s of SPECS) {
    const wrap = document.createElement("label"); wrap.className = "opt";
    if (s.t === "color") {
      wrap.innerHTML = `<span class="lbl">${s.label}</span><input type="color" value="${opts[s.k]}">`;
      wrap.querySelector("input").oninput = (e) => apply(s.k, e.target.value);
    } else if (s.t === "range") {
      wrap.innerHTML = `<span class="lbl">${s.label} <output>${opts[s.k]}</output></span><input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${opts[s.k]}">`;
      const out = wrap.querySelector("output");
      wrap.querySelector("input").oninput = (e) => { const v = Number(e.target.value); out.textContent = v; apply(s.k, v); };
    } else if (s.t === "select") {
      wrap.innerHTML = `<span class="lbl">${s.label}</span><select>${s.options.map(o=>`<option value="${o}">${o||"(centre)"}</option>`).join("")}</select>`;
      wrap.querySelector("select").onchange = (e) => apply(s.k, e.target.value);
    } else if (s.t === "check") {
      wrap.innerHTML = `<span class="lbl">${s.label}</span><input type="checkbox" ${opts[s.k]?"checked":""}>`;
      wrap.querySelector("input").onchange = (e) => apply(s.k, e.target.checked);
    }
    grid.appendChild(wrap);
  }
  $("exportOpts").onclick = () => {
    const pre = $("optJson"); pre.hidden = false;
    pre.textContent = JSON.stringify(opts, null, 2);
    navigator.clipboard?.writeText(pre.textContent).then(()=>{ $("exportOpts").textContent = "Copié ✓"; setTimeout(()=>$("exportOpts").textContent="Exporter mes réglages (JSON)",1500); }).catch(()=>{});
  };
</script>
</body>
</html>
