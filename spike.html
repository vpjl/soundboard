<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spike wavesurfer — éditeur audio</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 18px; background: #0d0f14; color: #e8e8ee; font: 14px/1.4 system-ui, sans-serif; }
  h1 { font-size: 1.05rem; margin: 0 0 4px; }
  .status { font-size: .8rem; color: #9aa0aa; margin-bottom: 14px; }
  .status b { color: #7ee0a2; }
  .panel { border: 1px solid #2a2e38; border-radius: 10px; padding: 12px; background: #12151c; margin-bottom: 12px; }
  #wave { background: #0a0c11; border-radius: 8px; }
  #minimap { margin-top: 6px; background: #0a0c11; border-radius: 6px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center; margin-top: 12px; }
  button { background: #20242e; color: #e8e8ee; border: 1px solid #343a46; border-radius: 7px; padding: 7px 12px; cursor: pointer; }
  button:hover { border-color: #5a6273; }
  label { display: inline-flex; align-items: center; gap: 6px; font-size: .85rem; color: #c4c8d2; }
  input[type=range] { width: 160px; }
  output { font-variant-numeric: tabular-nums; color: #a78bfa; min-width: 46px; }
  .regions { margin-top: 10px; font-size: .8rem; color: #9aa0aa; white-space: pre; font-family: ui-monospace, monospace; }
  .err { color: #ff6b6b; }
</style>
</head>
<body>
  <h1>Spike wavesurfer — proof of concept éditeur audio</h1>
  <div class="status" id="status">Chargement…</div>

  <div class="panel">
    <div id="wave"></div>
    <div id="minimap"></div>
    <div class="row">
      <button id="play">▶︎ Lire / Pause</button>
      <label><input type="checkbox" id="fill" checked> Adapter à la fenêtre (fillParent)</label>
      <label>Zoom <input type="range" id="zoom" min="0" max="300" value="0" disabled></label>
    </div>
    <div class="row">
      <label>Vitesse <input type="range" id="speed" min="0.5" max="2" step="0.05" value="1"><output id="speedVal">1.00×</output></label>
      <label><input type="checkbox" id="preserve" checked> garder le pitch (preservePitch)</label>
    </div>
    <div class="row">
      <button id="addCut">+ Région CUT</button>
      <button id="addSilence">+ Région SILENCE</button>
      <button id="clearRegions">Effacer régions</button>
      <span style="color:#9aa0aa;font-size:.8rem">(les régions sont déplaçables / redimensionnables)</span>
    </div>
    <div class="regions" id="regionList">—</div>
  </div>

  <div class="status">Cette page est isolée : elle ne touche pas l'app. wavesurfer ne sert qu'à la visualisation/édition ; la lecture live des pads resterait sur ton moteur Web Audio.</div>

<script type="module">
  const status = document.getElementById("status");
  const fail = (msg, e) => { status.innerHTML = '<span class="err">ÉCHEC : ' + msg + '</span>'; console.error(e); };

  let WaveSurfer, RegionsPlugin, MinimapPlugin, EnvelopePlugin;
  try {
    WaveSurfer     = (await import("./lib/wavesurfer.esm.js")).default;
    RegionsPlugin  = (await import("./lib/regions.esm.js")).default;
    MinimapPlugin  = (await import("./lib/minimap.esm.js")).default;
    EnvelopePlugin = (await import("./lib/envelope.esm.js")).default;
  } catch (e) { fail("import ESM local (hors-ligne) impossible", e); throw e; }

  // --- Génère un petit signal de test (3 salves) → WAV blob (aucun fichier requis)
  function makeToneWav() {
    const sr = 22050, dur = 4, n = sr * dur;
    const s = new Float32Array(n);
    const bursts = [[0.3,0.9,330],[1.5,2.6,220],[3.1,3.8,440]];
    for (const [a,b,f] of bursts) {
      const i0 = (a*sr)|0, i1 = (b*sr)|0, len = i1 - i0;
      for (let i = i0; i < i1; i++) {
        const t = (i - i0) / len;
        const env = Math.sin(Math.PI * t);            // fade in/out de la salve
        s[i] += Math.sin(2*Math.PI*f*(i/sr)) * 0.8 * env;
      }
    }
    const buf = new ArrayBuffer(44 + n*2), dv = new DataView(buf);
    const w = (o,str) => { for (let i=0;i<str.length;i++) dv.setUint8(o+i, str.charCodeAt(i)); };
    w(0,"RIFF"); dv.setUint32(4,36+n*2,true); w(8,"WAVE"); w(12,"fmt ");
    dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
    dv.setUint32(24,sr,true); dv.setUint32(28,sr*2,true); dv.setUint16(32,2,true); dv.setUint16(34,16,true);
    w(36,"data"); dv.setUint32(40,n*2,true);
    let off = 44;
    for (let i=0;i<n;i++){ const v=Math.max(-1,Math.min(1,s[i])); dv.setInt16(off,v*0x7fff,true); off+=2; }
    return URL.createObjectURL(new Blob([buf],{type:"audio/wav"}));
  }

  const regions  = RegionsPlugin.create();
  const minimap  = MinimapPlugin.create({ container: "#minimap", height: 28, waveColor: "#4b3f73", progressColor: "#7c3aed" });
  const envelope = EnvelopePlugin.create({
    volume: 0.9,
    lineColor: "#ffce5c",
    dragPointSize: 10,
    points: [ { time: 0.4, volume: 0.0 }, { time: 0.9, volume: 0.9 }, { time: 3.6, volume: 0.0 } ],
  });

  let ws;
  try {
    ws = WaveSurfer.create({
      container: "#wave",
      height: 160,
      waveColor: "#a78bfa",
      progressColor: "#7c3aed",
      cursorColor: "#e8e8ee",
      fillParent: true,
      url: makeToneWav(),
      plugins: [regions, minimap, envelope],
    });
  } catch (e) { fail("WaveSurfer.create", e); throw e; }

  ws.on("ready", () => {
    status.innerHTML = 'wavesurfer <b>7.12.8</b> chargé en local (hors-ligne) ✓ — waveform, regions, minimap, envelope OK. Durée: ' + ws.getDuration().toFixed(2) + 's';
    refreshRegions();
  });
  ws.on("error", (e) => fail("lecture/décodage", e));

  // --- Contrôles
  document.getElementById("play").onclick = () => ws.playPause();

  const fill = document.getElementById("fill"), zoom = document.getElementById("zoom");
  fill.onchange = () => {
    ws.setOptions({ fillParent: fill.checked });
    zoom.disabled = fill.checked;
    if (!fill.checked) ws.zoom(Number(zoom.value) || 50);
  };
  zoom.oninput = () => { if (!fill.checked) ws.zoom(Number(zoom.value)); };

  const speed = document.getElementById("speed"), speedVal = document.getElementById("speedVal"), preserve = document.getElementById("preserve");
  const applySpeed = () => { speedVal.textContent = Number(speed.value).toFixed(2) + "×"; ws.setPlaybackRate(Number(speed.value), preserve.checked); };
  speed.oninput = applySpeed; preserve.onchange = applySpeed;

  const colors = { cut: "rgba(255,80,80,0.28)", silence: "rgba(255,170,60,0.25)" };
  function addRegion(type) {
    const d = ws.getDuration() || 4, start = Math.random()*d*0.6, end = Math.min(d, start + 0.6);
    regions.addRegion({ start, end, color: colors[type], content: type.toUpperCase(), drag: true, resize: true });
    refreshRegions();
  }
  document.getElementById("addCut").onclick = () => addRegion("cut");
  document.getElementById("addSilence").onclick = () => addRegion("silence");
  document.getElementById("clearRegions").onclick = () => { regions.clearRegions(); refreshRegions(); };
  regions.on("region-updated", refreshRegions);
  regions.on("region-created", refreshRegions);

  function refreshRegions() {
    const list = regions.getRegions();
    document.getElementById("regionList").textContent = list.length
      ? list.map(r => `${(r.content?.textContent||"?").padEnd(8)} ${r.start.toFixed(2)}s → ${r.end.toFixed(2)}s`).join("\n")
      : "— aucune région —";
  }
</script>
</body>
</html>
